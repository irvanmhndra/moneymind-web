<!DOCTYPE html>
<html>
<head>
    <title>Test API Calls</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; }
        .button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        .error { color: red; }
        .success { color: green; }
        .info { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px; }
        pre { background: #f0f0f0; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>MoneyMind API Test</h1>

    <div class="info">
        <strong>Current token:</strong>
        <div id="current-token"></div>
    </div>

    <button class="button" onclick="login()">Login</button>
    <button class="button" onclick="testExpenses()">Test Expenses API</button>
    <button class="button" onclick="testBudgets()">Test Budgets API</button>
    <button class="button" onclick="testCategories()">Test Categories API</button>
    <button class="button" onclick="clearLogs()">Clear Logs</button>

    <div id="output"></div>

    <script>
        const API_BASE = 'http://173.212.217.52:8085/api/v1';

        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            output.appendChild(div);
        }

        function updateTokenDisplay() {
            const token = localStorage.getItem('access_token');
            const tokenDiv = document.getElementById('current-token');
            if (token) {
                tokenDiv.innerHTML = `${token.substring(0, 50)}... (${token.length} chars)`;
            } else {
                tokenDiv.innerHTML = 'No token found';
            }
        }

        async function login() {
            try {
                log('Attempting login...', 'info');
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'testpassword123'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.data.access_token);
                    localStorage.setItem('refresh_token', data.data.refresh_token);
                    localStorage.setItem('user', JSON.stringify(data.data.user));

                    log('✅ Login successful!', 'success');
                    log(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                    updateTokenDisplay();
                } else {
                    log(`❌ Login failed: ${data.message}`, 'error');
                    log(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'error');
                }
            } catch (error) {
                log(`❌ Login error: ${error.message}`, 'error');
            }
        }

        async function makeAuthenticatedRequest(endpoint, params = {}) {
            const token = localStorage.getItem('access_token');
            if (!token) {
                log('❌ No token found, please login first', 'error');
                return;
            }

            try {
                const url = new URL(`${API_BASE}${endpoint}`);
                Object.keys(params).forEach(key => {
                    if (params[key] !== undefined && params[key] !== null) {
                        url.searchParams.append(key, params[key]);
                    }
                });

                log(`🌐 Making request to: ${url.toString()}`, 'info');

                const response = await fetch(url.toString(), {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    log(`✅ ${endpoint} request successful (${response.status})`, 'success');
                    log(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                } else {
                    log(`❌ ${endpoint} request failed (${response.status}): ${data.message || 'Unknown error'}`, 'error');
                    log(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'error');
                }
            } catch (error) {
                log(`❌ Request error: ${error.message}`, 'error');
            }
        }

        function testExpenses() {
            makeAuthenticatedRequest('/expenses', {
                limit: 50,
                offset: 0,
                sort: 'date',
                order: 'desc'
            });
        }

        function testBudgets() {
            makeAuthenticatedRequest('/budgets');
        }

        function testCategories() {
            makeAuthenticatedRequest('/categories');
        }

        function clearLogs() {
            document.getElementById('output').innerHTML = '';
        }

        // Initialize
        updateTokenDisplay();
    </script>
</body>
</html>
